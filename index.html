<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NETAX 관리자 대시보드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0D1B3D;
      --gold: #C8A244;
      --bg: #F8F6F2;
      --line: #E3DFD6;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: #333; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    
    header { background: var(--navy); color: #fff; padding: 20px 0; position: sticky; top: 0; z-index: 50; }
    header h1 { font-size: 24px; font-weight: 700; }
    
    .auth-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    .auth-screen.active { display: flex; }
    .auth-box { background: #fff; padding: 40px; border-radius: 8px; text-align: center; }
    .auth-box input { display: block; width: 300px; padding: 12px; margin: 10px 0; border: 1px solid var(--line); border-radius: 4px; font-size: 16px; }
    .auth-box button { background: var(--navy); color: #fff; padding: 12px 24px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: 600; }
    
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--line); margin: 24px 0; }
    .tabs button { background: none; border: none; padding: 16px 24px; font-size: 16px; font-weight: 600; color: #999; cursor: pointer; border-bottom: 3px solid transparent; transition: .2s; }
    .tabs button.active { color: var(--navy); border-bottom-color: var(--gold); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    table th { background: #f0f0f0; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--line); }
    table td { padding: 12px; border-bottom: 1px solid var(--line); font-size: 14px; }
    table tr:hover { background: #fafafa; }
    
    button.approve { background: #4CAF50; color: #fff; padding: 6px 12px; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; margin-right: 4px; }
    button.reject { background: #f44336; color: #fff; padding: 6px 12px; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }
    
    .loading { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>NETAX 관리자 대시보드</h1>
  </div>
</header>

<!-- 비밀번호 인증 -->
<div id="auth-screen" class="auth-screen active">
  <div class="auth-box">
    <h2>관리자 인증</h2>
    <input type="password" id="admin-password" placeholder="비밀번호 입력" onkeypress="if(event.key==='Enter') authenticateAdmin()">
    <button onclick="authenticateAdmin()">인증</button>
  </div>
</div>

<!-- 대시보드 (인증 후) -->
<div id="dashboard" style="display: none;">
  <div class="wrap">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(0)">상담신청 관리</button>
      <button class="tab-btn" onclick="switchTab(1)">통계</button>
    </div>

    <!-- 상담신청 관리 -->
    <div id="tab0" class="tab-content active">
      <h3>상담신청 대기</h3>
      <table id="pending-table">
        <thead>
          <tr>
            <th>신청자</th>
            <th>전화</th>
            <th>유형</th>
            <th>신청일</th>
            <th>상황</th>
            <th>액션</th>
          </tr>
        </thead>
        <tbody id="pending-tbody">
          <tr><td colspan="6" class="loading">로딩 중...</td></tr>
        </tbody>
      </table>

      <h3 style="margin-top: 40px;">상담신청 완료</h3>
      <table id="approved-table">
        <thead>
          <tr>
            <th>신청자</th>
            <th>전화</th>
            <th>신청일</th>
            <th>확정일</th>
            <th>예약일</th>
          </tr>
        </thead>
        <tbody id="approved-tbody">
          <tr><td colspan="5" class="loading">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 통계 -->
    <div id="tab1" class="tab-content">
      <h3>상담신청 통계</h3>
      <p id="stats-info" style="margin: 20px 0; padding: 20px; background: #f0f0f0; border-radius: 4px;"></p>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'netax2024';
const SHEETS_ID = '1HMMKMd0bp7kjK7Z8oSMJy2TSXFKB0EUC1XCIjSsfrmQ';
const API_URL = 'https://script.google.com/macros/s/AKfycby0HSS6KMvcJVVIkHBWORdMFQOKlEehOVw5ckIgZPfS7I3oaREv5MKyRF_lboYQwWU8rw/exec';

let allBookingData = [];

function authenticateAdmin() {
  const password = document.getElementById('admin-password').value;
  if (password === ADMIN_PASSWORD) {
    document.getElementById('auth-screen').classList.remove('active');
    document.getElementById('dashboard').style.display = 'block';
    loadConsultingData();
  } else {
    alert('비밀번호가 틀렸습니다.');
  }
}

function switchTab(index) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab${index}`).classList.add('active');
  document.querySelectorAll('.tab-btn')[index].classList.add('active');
  
  if (index === 1) {
    updateStats();
  }
}

function loadConsultingData() {
  // Google Sheets에서 Bookings 탭 데이터 조회
  fetch(API_URL + '?action=getBookings')
    .then(response => response.json())
    .then(data => {
      allBookingData = data.bookings || [];
      renderTables();
    })
    .catch(error => {
      console.log('API 응답 오류, 샘플 데이터로 표시합니다.');
      renderSampleData();
    });
}

function renderTables() {
  const pending = allBookingData.filter(b => b.status === '신청' || !b.status);
  const approved = allBookingData.filter(b => b.status === '확정');

  // 대기 목록
  const pendingHtml = pending.length > 0 
    ? pending.map((b, i) => `
      <tr>
        <td>${b.name || '-'}</td>
        <td>${b.phone || '-'}</td>
        <td>${b.type || '-'}</td>
        <td>${b.date || '-'}</td>
        <td>${(b.situation || '').substring(0, 20)}...</td>
        <td>
          <button class="approve" onclick="approveBooking(${i})">✓승인</button>
          <button class="reject" onclick="rejectBooking(${i})">✕거절</button>
        </td>
      </tr>
    `).join('')
    : '<tr><td colspan="6" style="text-align: center; color: #999;">신청 대기 항목이 없습니다.</td></tr>';

  document.getElementById('pending-tbody').innerHTML = pendingHtml;

  // 완료 목록
  const approvedHtml = approved.length > 0
    ? approved.map(b => `
      <tr>
        <td>${b.name || '-'}</td>
        <td>${b.phone || '-'}</td>
        <td>${b.date || '-'}</td>
        <td>${b.approvedDate || '-'}</td>
        <td>${b.reservedDate || '예약 대기'}</td>
      </tr>
    `).join('')
    : '<tr><td colspan="5" style="text-align: center; color: #999;">완료된 항목이 없습니다.</td></tr>';

  document.getElementById('approved-tbody').innerHTML = approvedHtml;
}

function renderSampleData() {
  // 임시 샘플 데이터 (API 실패 시)
  document.getElementById('pending-tbody').innerHTML = `
    <tr>
      <td>홍길동</td>
      <td>010-1234-5678</td>
      <td>법인대표</td>
      <td>2026-07-08</td>
      <td>상속세 절세...</td>
      <td>
        <button class="approve" onclick="alert('승인 기능은 Apps Script 연동 후 작동합니다.')">✓승인</button>
        <button class="reject" onclick="alert('거절 기능은 Apps Script 연동 후 작동합니다.')">✕거절</button>
      </td>
    </tr>
  `;
  document.getElementById('approved-tbody').innerHTML = `
    <tr>
      <td colspan="5" style="text-align: center; color: #999;">완료된 항목이 없습니다.</td>
    </tr>
  `;
}

function approveBooking(index) {
  if (confirm('승인하시겠습니까?')) {
    console.log('승인:', allBookingData[index]);
    alert('승인 기능은 Apps Script와 연동 후 작동합니다.');
  }
}

function rejectBooking(index) {
  if (confirm('거절하시겠습니까?')) {
    console.log('거절:', allBookingData[index]);
    alert('거절 기능은 Apps Script와 연동 후 작동합니다.');
  }
}

function updateStats() {
  const total = allBookingData.length;
  const pending = allBookingData.filter(b => b.status === '신청' || !b.status).length;
  const approved = allBookingData.filter(b => b.status === '확정').length;

  document.getElementById('stats-info').innerHTML = `
    <strong>전체 신청:</strong> ${total}건 | 
    <strong>대기 중:</strong> ${pending}건 | 
    <strong>확정 완료:</strong> ${approved}건
  `;
}

// 초기 로드 시 샘플 데이터 표시
loadConsultingData();
</script>

</body>
</html>
